# HELP
help.display==== POMOC ====\n\
1. Wypożycz książkę - wpisz tytuł lub część tytułu, następnie wybierz książkę z listy\n\
2. Zwróć książkę - zobacz wypożyczone książki i wybierz którą chcesz zwrócić\n\
3. Szukaj książek - znajdź książki według tytułu lub autora\n\
4. Dodaj książkę - dodaj nową książkę do biblioteki\n\
5. Wyjście - zamknij aplikację

