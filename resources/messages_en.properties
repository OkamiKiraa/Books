# HELP
help.display==== HELP ====\n\
1. Borrow a book - enter the title or part of the title, then choose a book from the list\n\
2. Return a book - view your borrowed books and choose which one to return\n\
3. Search for books - find books by title or author\n\
4. Add a book - add a new book to the library\n\
5. Exit - close the application

help.press=Press Enter to return to the menu...

